name: X 10s Realtime Monitor

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    concurrency:
      group: x-high-frequency-group
      cancel-in-progress: false

    steps:
    - name: 📥 1. 拉取仓库代码
      uses: actions/checkout@v3

    - name: 🐍 2. 部署云端 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 💾 3. 恢复长效状态缓存
      uses: actions/cache@v3
      with:
        path: |
          last_seen_id.txt
        key: monitor-cache-${{ github.run_id }}
        restore-keys: |
          monitor-cache-

    - name: 📦 4. 补齐依赖组件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 📡 5. 启动 5.8小时 永续高频扫描
      env:
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python -u monitor.py
